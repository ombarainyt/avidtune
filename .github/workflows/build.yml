name: Build Release APK

on:
  push:
    branches: [ "**" ] # Triggers on all branches. You can change this to [ "main", "master" ] if you only want to build the main branch.
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important: Fetches submodules if your project relies on them (like the Extractor)

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AvidTune-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14